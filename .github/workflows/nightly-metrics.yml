name: Nightly LoC Collection

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: OctoTS/OctoTS-tools
          path: tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate raw data
        run: |
          python3 tools/generateSampleData.py . --output temp.csv

      - name: Process data (append to time series)
        run: |
          python3 tools/processData.py --input temp.csv --output metrics.csv

      - name: Commit and push if changes exist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ -f metrics.csv ]; then
            git add metrics.csv
            git diff --quiet && git diff --staged --quiet || \
              (git commit -m "chore: update metrics [skip ci]" && git push)
          else
            echo "No metrics file generated."
          fi